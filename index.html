<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogi's Task= | Premium To-Do List</title>
    <meta name="description" content="A sleek, premium to-do list application for ultimate productivity.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <h1>Yogi's<span>Task</span></h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span id="total-count">0</span>
                    <label>Total</label>
                </div>
                <div class="stat-item">
                    <span id="completed-count">0</span>
                    <label>Completed</label>
                </div>
            </div>
        </header>

        <main>
            <section class="task-form-section">
                <form id="task-form">
                    <div class="form-group main-input">
                        <input type="text" id="task-title" placeholder="What needs to be done?" required
                            autocomplete="off">
                        <button type="submit" id="add-task-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="form-row secondary-inputs">
                        <textarea id="task-desc" placeholder="Add a description (optional)"></textarea>
                        <div class="input-meta">
                            <select id="task-priority">
                                <option value="low">Low Priority</option>
                                <option value="medium" selected>Medium Priority</option>
                                <option value="high">High Priority</option>
                            </select>
                            <input type="date" id="task-due-date">
                        </div>
                    </div>
                </form>
            </section>

            <section class="filters-section">
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="sort">
                    <select id="sort-select">
                        <option value="date-new">Newest First</option>
                        <option value="date-old">Oldest First</option>
                        <option value="priority">By Priority</option>
                    </select>
                </div>
            </section>

            <section class="task-list-section">
                <div id="task-list" class="task-list">
                    <!-- Tasks will be injected here -->
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                            class="feather feather-clipboard">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                        <p>No tasks yet. Start by adding one above!</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Edit Modal -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Edit Task</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="edit-form">
                    <input type="hidden" id="edit-task-id">
                    <div class="form-group">
                        <label for="edit-title">Title</label>
                        <input type="text" id="edit-title" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-desc">Description</label>
                        <textarea id="edit-desc"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-priority">Priority</label>
                            <select id="edit-priority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-due-date">Due Date</label>
                            <input type="date" id="edit-due-date">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-cancel close-modal">Cancel</button>
                        <button type="submit" class="btn-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
